<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekstipohjainen peli</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">

        <div class="container-inner">
            <img id="image" src="" alt="">
            <input id="input" type="text" placeholder="Mitä haluat tehdä">
            <button id="button">Vastaa</button>



            <p id="output" class="output"></p>
            <details>
                <summary>Ohjeet</summary>
                <p>
                    <b>Peliohjeet</b><br>
                    Tavoitteenasi on lyödä lohikäärme esineiden avulla joita löydät kartalta.<br><br>

                    <span class="command">Liiku: pohjoinen, etelä, itä, länsi</span><br>
                    <span class="command">Poimi esine: poimi + esineen nimi</span><br>
                    <span class="command">Käytä esine: käytä + esineen nimi</span>
                </p>

            </details>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>

</html>
