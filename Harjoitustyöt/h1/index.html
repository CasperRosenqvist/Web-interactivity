<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekstipohjainen peli</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">

        <div class="container-inner">
            <img id="image" src="" alt="">

            <div class="minimap">
                <div>Torni</div>
                <div>Kaivo</div>
                <div>Aukio</div>

                <div>Lohikäärme</div>
                <div>Polku</div>
                <div>Portti</div>

                <div>Joki</div>
                <div>Penkki</div>
                <div>Mökki</div>
            </div>

            <input id="input" type="text" placeholder="Mitä haluat tehdä">
            <button id="button">Vastaa</button>



            <p id="output" class="output"></p>
            <div class="instructions">
                <details>
                    <summary><b>Peliohjeet</b></summary>
                    <p>
                        <br>
                        Tavoitteenasi on lyödä lohikäärme esineiden avulla joita löydät kartalta.<br><br>
                    </p>
                    <div class="command">
                        <p>
                            Liiku: pohjoinen, etelä, itä, länsi<br>
                            Poimi esine: poimi + esineen nimi<br>
                            Käytä esine: käytä + esineen nimi
                        </p>
                    </div>


                </details>
            </div>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>

</html>
