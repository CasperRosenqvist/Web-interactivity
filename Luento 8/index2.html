<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .map {
            height: 600px;
        }

        .popup {
            text-align: center;
            font-size: 12px;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js'></script>
    <link href='https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/leaflet.fullscreen.css'
        rel='stylesheet' />
</head>

<body>
    <div class="map" id="map"></div>
    <script>
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        map.addControl(new L.Control.Fullscreen());


        const data_url = "gh4g-9sfh.json";

        const getData = async () => {
            const response = await fetch(data_url);
            const data = await response.json();
            console.log(data);
            data.forEach(item => {
                if (item.reclat && item.reclong && item.mass) {
                    const year = new Date(item.year).getFullYear();
                    const massKg = item.mass / 1000
                    let iconUrlMass;
                    if (massKg < 0.5) {
                        iconUrlMass = "icons/marker-icon-blue.png"
                    } else if (massKg >= 0.5 && massKg <= 10) {
                        iconUrlMass = "icons/marker-icon-green.png"
                    } else if (massKg > 10) {
                        iconUrlMass = "icons/marker-icon-red.png"
                    }
                    const myIcon = L.icon({
                        iconUrl: iconUrlMass,
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [0, -41],
                    })
                    const marker = L.marker([item.reclat, item.reclong], { icon: myIcon, title: item.name })
                    marker.addTo(map);
                    marker.bindPopup("<div class=popup> <b>" + item.name + "</b><br>" + massKg + " kg<br>" + year + "</div>");
                }
            });
        }

        getData();
    </script>
</body>

</html>
